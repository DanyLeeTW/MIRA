version: '3.8'

services:
  hapi-fhir:
    image: hapiproject/hapi:v7.4.0
    container_name: hapi-fhir
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - HAPI_FHIR_VERSION=7.4.0
    volumes:
      - hapi-data:/var/lib/hapi-fhir
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/fhir/metadata" ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  hapi-data:
